services:
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    ports:
      - '3000:3000'
    env_file: .env
    volumes:
      - dashboard_data:/app/data
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:3000/api/health']
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 3
    restart: unless-stopped

  backup:
    build:
      context: .
      dockerfile: docker/Dockerfile.backup
    volumes:
      - dashboard_data:/app/data
    environment:
      DB_PATH: /app/data/dashboard.db
      BACKUP_DIR: /app/data/backups
    depends_on:
      - app
    restart: unless-stopped

volumes:
  dashboard_data:
    driver: local
