name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run lint
      - run: npm run format:check

  type-check:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npx prisma generate
      - run: npm run type-check

  unit-test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run test -- --passWithNoTests

  integration-test:
    name: Integration Tests
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: file:./data/test.db
      SESSION_SECRET: test-session-secret-minimum-32-chars
      APP_PASSWORD_HASH: ${{ secrets.TEST_PASSWORD_HASH || '$2b$10$placeholder' }}
      LIST_PROVIDER: apple_reminders
      APPLE_SHORTCUTS_NAME: TestShortcut
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npx prisma generate
      - run: mkdir -p data
      - run: npx prisma migrate deploy
      - run: npm run test:integration -- --passWithNoTests

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, type-check, unit-test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npx prisma generate
      - run: npm run build
        env:
          DATABASE_URL: file:./data/build.db
          SESSION_SECRET: build-secret-minimum-32-characters
          APP_PASSWORD_HASH: '$2b$10$placeholder'
          LIST_PROVIDER: apple_reminders
          APPLE_SHORTCUTS_NAME: TestShortcut

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile
          push: false
          tags: coles-dashboard:ci
