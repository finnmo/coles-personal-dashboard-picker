# Unraid-ready Docker Compose
# ─────────────────────────────────────────────────────────────────────────────
# Usage: copy this file to your Unraid server, fill in the environment
# variables below, then run: docker compose -f docker-compose.unraid.yml up -d
#
# Alternatively install via Unraid Community Applications using the template
# at: unraid/template.xml
# ─────────────────────────────────────────────────────────────────────────────

services:
  household-dashboard:
    image: ghcr.io/finnmo/coles-personal-dashboard-picker:latest
    container_name: household-dashboard
    restart: unless-stopped

    ports:
      - '3000:3000'

    volumes:
      # Unraid appdata convention — adjust share name if needed
      - /mnt/user/appdata/household-dashboard:/app/data

    environment:
      # ── First-run setup ───────────────────────────────────────────────────
      # Set SETUP_PASSWORD on first start. The container hashes it and
      # persists the hash to /app/data. You can then remove SETUP_PASSWORD.
      SETUP_PASSWORD: ""

      # Leave blank — auto-generated and persisted on first start.
      SESSION_SECRET: ""

      # ── List integration ──────────────────────────────────────────────────
      # Options: apple_reminders | google_tasks
      LIST_PROVIDER: "apple_reminders"
      # Must match the exact name of your iOS Shortcut
      APPLE_SHORTCUTS_NAME: "AddToShopping"

      # Google Tasks (only needed if LIST_PROVIDER=google_tasks)
      GOOGLE_CLIENT_ID: ""
      GOOGLE_CLIENT_SECRET: ""
      GOOGLE_REFRESH_TOKEN: ""
      GOOGLE_TASK_LIST_ID: ""

      # ── Coles product search ──────────────────────────────────────────────
      # Get a free key at: https://rapidapi.com/search/coles
      RAPIDAPI_KEY: ""

      # ── Optional ──────────────────────────────────────────────────────────
      LOG_LEVEL: "info"
      SESSION_EXPIRY_HOURS: "24"

    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:3000/api/health']
      interval: 30s
      timeout: 10s
      start_period: 40s
      retries: 3

  household-dashboard-backup:
    image: ghcr.io/finnmo/coles-personal-dashboard-picker-backup:latest
    container_name: household-dashboard-backup
    restart: unless-stopped

    volumes:
      - /mnt/user/appdata/household-dashboard:/app/data

    environment:
      DB_PATH: /app/data/dashboard.db
      BACKUP_DIR: /app/data/backups

    depends_on:
      household-dashboard:
        condition: service_healthy
